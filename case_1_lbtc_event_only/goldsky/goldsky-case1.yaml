# Goldsky Turbo — Case 1: LBTC Transfer events (event-only indexing)
#
# Indexes LBTC Transfer events in blocks [0, 22,200,000]. Decodes from the
# ethereum.raw_logs dataset via _gs_log_decode (two-stage: decode, then
# extract + filter); the uint256 `value` is stored as its exact decoded string.
# The source filter pins the LBTC contract so the scan only touches its logs.

name: goldsky-case1
resource_size: m
job: true

sources:
  logs:
    type: dataset
    dataset_name: ethereum.raw_logs
    version: 1.2.0
    start_at: earliest
    primary_key: id
    filter: >-
      address = '0x8236a87084f8b84306f72007f36f2618a5634494' AND block_number <= 22200000

transforms:
  decoded_events:
    type: sql
    primary_key: id
    sql: >-
      SELECT
        _gs_log_decode('[{"anonymous":false,"inputs":[{"indexed":true,"name":"from","type":"address"},{"indexed":true,"name":"to","type":"address"},{"indexed":false,"name":"value","type":"uint256"}],"name":"Transfer","type":"event"}]', topics, `data`) AS `decoded`,
        id,
        block_number,
        block_timestamp,
        transaction_hash
      FROM logs

  transfers:
    type: sql
    primary_key: id
    sql: >-
      SELECT
        id,
        `decoded`.event_params[1] AS "from",
        `decoded`.event_params[2] AS "to",
        `decoded`.event_params[3] AS "value",
        block_number,
        block_timestamp,
        transaction_hash
      FROM decoded_events
      WHERE `decoded`.event_signature = 'Transfer'

sinks:
  transfers_pg:
    type: postgres
    from: transfers
    schema: public
    table: goldsky_case1
    secret_name: MY_POSTGRES_SECRET
    primary_key: id
