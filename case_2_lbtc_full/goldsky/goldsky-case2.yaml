# Goldsky Turbo — Case 2: LBTC balances + points (RPC enrichment)
#
# One Turbo pipeline over LBTC Transfers in blocks [22,400,000, 22,500,000], fanning
# a single source read into two branches:
#   (A) balances: balanceOf(account) via _gs_eth_call over Edge RPC -> postgres sink
#                 (distinct accounts; zero address excluded)
#   (B) points:   summation-by-parts (RPC start-of-window balance + within-window
#                 transfer-delta integral) -> postgres_aggregate sink
# Both branches run concurrently off the shared decode; Edge RPC is the bottleneck.
#
# Deploy with `goldsky turbo apply --skip-validation` (the postgres_aggregate sink's
# validator can time out against a pooled Postgres connection; runtime is fine).
# Swap in your own Goldsky Edge secret for <YOUR_GOLDSKY_EDGE_SECRET> at deploy time.

name: goldsky-case2
resource_size: m
job: true

sources:
  logs:
    type: dataset
    dataset_name: ethereum.raw_logs
    version: 1.2.0
    start_at: earliest
    primary_key: id
    filter: >-
      address = '0x8236a87084f8b84306f72007f36f2618a5634494'
      AND block_number >= 22400000 AND block_number <= 22500000
      AND topics LIKE '0xddf252ad%'

transforms:
  # ---- shared decode ----
  transfers:
    type: sql
    primary_key: id
    sql: >-
      SELECT
        _gs_log_decode('[{"anonymous":false,"inputs":[{"indexed":true,"name":"from","type":"address"},{"indexed":true,"name":"to","type":"address"},{"indexed":false,"name":"value","type":"uint256"}],"name":"Transfer","type":"event"}]', topics, `data`) AS `decoded`,
        id, block_number, block_timestamp
      FROM logs

  # ---- branch A: balances (RPC balanceOf at transfer block) ----
  bal_accounts_raw:
    type: sql
    primary_key: id
    sql: >-
      SELECT LOWER(`decoded`.event_params[1]) AS account, block_number, block_timestamp, id
      FROM transfers WHERE `decoded`.event_signature = 'Transfer'
      UNION ALL
      SELECT LOWER(`decoded`.event_params[2]) AS account, block_number, block_timestamp, id
      FROM transfers WHERE `decoded`.event_signature = 'Transfer'

  bal_accounts:
    type: sql
    primary_key: id
    sql: >-
      SELECT
        account AS id,
        CAST(_gs_eth_call('https://edge.goldsky.com/standard/evm/1?secret=<YOUR_GOLDSKY_EDGE_SECRET>', 'balanceOf(address)(uint256)', '0x8236a87084f8b84306f72007f36f2618a5634494', ARRAY[account], CAST(block_number AS BIGINT), true, 500)[1] AS VARCHAR) AS lbtc_balance,
        CAST(block_number AS VARCHAR) AS last_block,
        CAST(block_timestamp AS VARCHAR) AS last_ts
      FROM bal_accounts_raw
      WHERE account <> '0x0000000000000000000000000000000000000000'

  # ---- branch B: points (summation-by-parts) ----
  pts_accounts_raw:
    type: sql
    primary_key: row_id
    sql: >-
      SELECT LOWER(`decoded`.event_params[2]) AS account, `decoded`.event_params[3] AS value, block_timestamp, 1.0 AS sgn, CONCAT(id, '_t') AS row_id
      FROM transfers WHERE `decoded`.event_signature = 'Transfer'
      UNION ALL
      SELECT LOWER(`decoded`.event_params[1]) AS account, `decoded`.event_params[3] AS value, block_timestamp, -1.0 AS sgn, CONCAT(id, '_f') AS row_id
      FROM transfers WHERE `decoded`.event_signature = 'Transfer'

  pts_contributions:
    type: sql
    primary_key: row_id
    sql: >-
      SELECT
        account,
        row_id,
        sgn * (CAST(value AS DOUBLE) / 1e8) * CAST((1747451507 - block_timestamp) AS DOUBLE) * (1000.0 / 86400.0) AS window_contribution,
        (CAST(_gs_eth_call('https://edge.goldsky.com/standard/evm/1?secret=<YOUR_GOLDSKY_EDGE_SECRET>', 'balanceOf(address)(uint256)', '0x8236a87084f8b84306f72007f36f2618a5634494', ARRAY[account], 22400000, true, 500)[1] AS DOUBLE) / 1e8) * 1215588.0 * (1000.0 / 86400.0) AS start_contribution
      FROM pts_accounts_raw
      WHERE account <> '0x0000000000000000000000000000000000000000'

sinks:
  pg_balances:
    type: postgres
    from: bal_accounts
    schema: public
    table: goldsky_case2_balances
    secret_name: MY_POSTGRES_SECRET
    primary_key: id

  pg_points:
    type: postgres_aggregate
    from: pts_contributions
    schema: public
    landing_table: goldsky_case2_points_log
    agg_table: goldsky_case2_points
    primary_key: row_id
    secret_name: MY_POSTGRES_SECRET
    group_by:
      account:
        type: text
    aggregate:
      points_window:
        from: window_contribution
        fn: sum
        type: double precision
      points_start:
        from: start_contribution
        fn: max
        type: double precision
