# Goldsky Turbo — Case 5: Uniswap V2 swap trace decoding
#
# Decodes Uniswap V2 Router swapExactTokensForTokens calls from transaction
# traces in blocks [22,200,000, 22,290,000]. Reads ethereum.raw_traces filtered
# to the Router + selector 0x38ed1739 and decodes the calldata (including the
# dynamic address[] path) in SQL via evm_trace_decode. One row per swap.

name: goldsky-case5
resource_size: m
job: true

sources:
  traces:
    type: dataset
    dataset_name: ethereum.raw_traces
    version: 1.2.0
    start_at: earliest
    primary_key: id
    filter: >-
      to_address = '0x7a250d5630b4cf539739df2c5dacb4c659f2488d'
      AND block_number >= 22200000 AND block_number <= 22290000
      AND trace_type = 'call'
      AND input LIKE '0x38ed1739%'

transforms:
  decoded:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        block_number,
        transaction_hash,
        from_address,
        evm_trace_decode(
          '[{"name":"swapExactTokensForTokens","type":"function","inputs":[{"name":"amountIn","type":"uint256"},{"name":"amountOutMin","type":"uint256"},{"name":"path","type":"address[]"},{"name":"to","type":"address"},{"name":"deadline","type":"uint256"}],"outputs":[{"name":"amounts","type":"uint256[]"}]}]',
          input,
          output
        ) AS decoded
      FROM traces

  swaps:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        CAST(block_number AS VARCHAR) AS block_number,
        transaction_hash,
        from_address AS from_addr,
        decoded.inputs[4] AS to_addr,
        decoded.inputs[1] AS amount_in,
        decoded.inputs[2] AS amount_out_min,
        decoded.inputs[5] AS deadline,
        replace(replace(replace(replace(decoded.inputs[3], '[', ''), ']', ''), '"', ''), ' ', '') AS path,
        CAST(
          array_length(
            string_to_array(
              replace(replace(replace(replace(decoded.inputs[3], '[', ''), ']', ''), '"', ''), ' ', ''),
              ','
            )
          ) AS VARCHAR
        ) AS path_length
      FROM decoded
      WHERE decoded IS NOT NULL

sinks:
  pg:
    type: postgres
    from: swaps
    schema: public
    table: goldsky_case5
    secret_name: MY_POSTGRES_SECRET
    primary_key: id
