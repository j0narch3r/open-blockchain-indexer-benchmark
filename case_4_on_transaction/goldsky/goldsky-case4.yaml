# Goldsky Turbo — Case 4: per-transaction gas spend
#
# For every transaction in blocks [22,280,000, 22,290,000], computes
# gas_value = gas_used * effective_gas_price using native u256 arithmetic.
# Two-step SQL over ethereum.receipt_transactions: (1) stringify the native U256
# columns with u256_to_string; (2) to_u256 + u256_mul + u256_to_string.
# No event decoding, no RPC.

name: goldsky-case4
resource_size: m
job: true

sources:
  txs:
    type: dataset
    dataset_name: ethereum.receipt_transactions
    version: 1.2.0
    start_at: earliest
    primary_key: id
    filter: >-
      block_number >= 22280000 AND block_number <= 22290000

transforms:
  txs_str:
    type: sql
    primary_key: id
    sql: |
      SELECT
        hash AS id,
        hash,
        from_address,
        to_address,
        block_number,
        u256_to_string(receipt_gas_used) AS gas_used_s,
        u256_to_string(gas_price) AS gas_price_s,
        u256_to_string(receipt_effective_gas_price) AS effective_gas_price_s
      FROM txs

  gas_spent:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        from_address AS from_addr,
        COALESCE(to_address, '0x0000000000000000000000000000000000000000') AS to_addr,
        u256_to_string(
          u256_mul(
            to_u256(gas_used_s),
            to_u256(COALESCE(effective_gas_price_s, gas_price_s))
          )
        ) AS gas_value,
        gas_used_s AS gas_used,
        gas_price_s AS gas_price,
        COALESCE(effective_gas_price_s, gas_price_s) AS effective_gas_price,
        block_number,
        hash AS transaction_hash
      FROM txs_str

sinks:
  pg:
    type: postgres
    from: gas_spent
    schema: public
    table: goldsky_case4
    secret_name: MY_POSTGRES_SECRET
    primary_key: id
