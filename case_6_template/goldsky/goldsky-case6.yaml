# Goldsky Turbo — Case 6: Uniswap V2 factory/template pattern
#
# Discovers Uniswap V2 pair contracts from the factory's PairCreated events into a
# Postgres-backed dynamic table, then indexes Swap events emitted by those pairs.
# Blocks [19,000,000, 19,010,000]. job: true → self-terminates.
#   Factory 0x5c69bee701ef814a2b6a3edd4b1652cb9cc5aa6f
#   PairCreated topic0 0x0d3648bd...   Swap topic0 0xd78ad95f...

name: goldsky-case6
resource_size: m
job: true

sources:
  logs:
    type: dataset
    dataset_name: ethereum.raw_logs
    version: 1.2.0
    start_at: earliest
    primary_key: id
    filter: >-
      block_number >= 19000000 AND block_number <= 19010000
      AND (topics LIKE '0x0d3648bd%' OR topics LIKE '0xd78ad95f%')

transforms:
  goldsky_case6_pairs:
    type: dynamic_table
    backend_type: Postgres
    backend_entity_name: goldsky_case6_pairs
    secret_name: MY_POSTGRES_SECRET
    sql: >-
      SELECT CONCAT('0x', LOWER(SUBSTR(`data`, 27, 40))) AS pair_address
      FROM logs
      WHERE address = '0x5c69bee701ef814a2b6a3edd4b1652cb9cc5aa6f' AND topics LIKE '0x0d3648bd%'

  swaps_decoded:
    type: sql
    primary_key: id
    sql: >-
      SELECT
        _gs_log_decode('[{"anonymous":false,"inputs":[{"indexed":true,"name":"sender","type":"address"},{"indexed":false,"name":"amount0In","type":"uint256"},{"indexed":false,"name":"amount1In","type":"uint256"},{"indexed":false,"name":"amount0Out","type":"uint256"},{"indexed":false,"name":"amount1Out","type":"uint256"},{"indexed":true,"name":"to","type":"address"}],"name":"Swap","type":"event"}]', topics, `data`) AS `decoded`,
        id, address, block_number, transaction_hash
      FROM logs
      WHERE topics LIKE '0xd78ad95f%' AND dynamic_table_check('goldsky_case6_pairs', LOWER(address))

  swaps:
    type: sql
    primary_key: id
    sql: >-
      SELECT
        id,
        address AS pair,
        CAST(block_number AS VARCHAR) AS block_number,
        transaction_hash,
        LOWER(`decoded`.event_params[1]) AS sender,
        LOWER(`decoded`.event_params[6]) AS to_addr,
        `decoded`.event_params[2] AS amount0_in,
        `decoded`.event_params[3] AS amount1_in,
        `decoded`.event_params[4] AS amount0_out,
        `decoded`.event_params[5] AS amount1_out
      FROM swaps_decoded
      WHERE `decoded`.event_signature = 'Swap'

sinks:
  pg:
    type: postgres
    from: swaps
    schema: public
    table: goldsky_case6
    secret_name: MY_POSTGRES_SECRET
    primary_key: id
